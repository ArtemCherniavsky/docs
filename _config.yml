title: Stimulsoft Reports Documentation
description: Programming documentation for Stimulsoft Reports products.

# No theme - we use our own layout
theme: null

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

# Apply our default layout to all markdown pages
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Exclude non-doc files from Jekyll build
exclude:
  - scripts/
  - "*.py"
  - "*.js"
  - README.md
  - Gemfile
  - Gemfile.lock

# Include all subdirectories (Jekyll ignores folders starting with _ or .)
include:
  - images/
