title: Stimulsoft Reports Documentation
description: Programming documentation for Stimulsoft Reports products.

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

# Apply our layout to all markdown pages (no frontmatter needed)
defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - scripts/
  - "*.py"
  - README.md
  - Gemfile
  - Gemfile.lock
