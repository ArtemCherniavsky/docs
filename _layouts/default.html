<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      color: #24292f;
      background: #fff;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #f6f8fa;
      border-right: 1px solid #d0d7de;
      overflow-y: auto;
      height: 100vh;
      position: sticky;
      top: 0;
      padding: 16px 0;
    }

    #sidebar .site-title {
      font-size: 14px;
      font-weight: 600;
      color: #24292f;
      padding: 0 16px 12px;
      border-bottom: 1px solid #d0d7de;
      margin-bottom: 8px;
      text-decoration: none;
      display: block;
    }

    #sidebar ul {
      list-style: none;
      padding: 0;
    }

    #sidebar > ul { padding: 0 8px; }

    #sidebar li { line-height: 1; }

    #sidebar li a {
      display: block;
      padding: 5px 8px;
      border-radius: 6px;
      color: #24292f;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar li a:hover { background: #eaeef2; }
    #sidebar li a.active { background: #0969da; color: #fff; font-weight: 500; }

    /* Top-level categories */
    #sidebar > ul > li > a {
      font-weight: 600;
      font-size: 13px;
    }

    /* Nested levels */
    #sidebar li ul {
      display: none;
      padding-left: 12px;
    }
    #sidebar li.open > ul { display: block; }

    /* Toggle arrow */
    #sidebar li.has-children > a::before {
      content: "▶ ";
      font-size: 10px;
      opacity: 0.5;
    }
    #sidebar li.has-children.open > a::before {
      content: "▼ ";
    }

    /* Main content */
    #content {
      flex: 1;
      padding: 32px 48px;
      max-width: 900px;
      overflow-x: auto;
    }

    #content h1 { font-size: 28px; margin-bottom: 16px; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
    #content h2 { font-size: 22px; margin: 24px 0 12px; }
    #content h3 { font-size: 18px; margin: 20px 0 10px; }
    #content h4 { font-size: 15px; margin: 16px 0 8px; }

    #content p { margin-bottom: 12px; line-height: 1.6; }
    #content ul, #content ol { margin: 8px 0 12px 24px; line-height: 1.6; }
    #content li { margin-bottom: 4px; }

    #content a { color: #0969da; text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    #content img { max-width: 100%; height: auto; margin: 8px 0; border: 1px solid #d0d7de; border-radius: 6px; }

    #content pre {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
    }
    #content code {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 13px;
      font-family: "SFMono-Regular", Consolas, monospace;
    }
    #content pre code {
      background: none;
      border: none;
      padding: 0;
    }

    #content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    #content th, #content td { border: 1px solid #d0d7de; padding: 8px 12px; text-align: left; }
    #content th { background: #f6f8fa; font-weight: 600; }

    #content blockquote {
      border-left: 4px solid #d0d7de;
      padding: 4px 16px;
      color: #656d76;
      margin: 12px 0;
    }

    /* Mobile */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-width: unset; height: auto; position: static; }
      #content { padding: 16px; }
    }
  </style>
</head>
<body>
  <nav id="sidebar">
    <a class="site-title" href="/">{{ site.title }}</a>
    <ul>
      {% include sidebar_item.html items=site.data.sidebar %}
    </ul>
  </nav>
  <main id="content">
    {{ content }}
  </main>
  <script>
    // Click on category title toggles open/close
    document.querySelectorAll('#sidebar li.has-children > a').forEach(function(a) {
      a.addEventListener('click', function(e) {
        var li = this.closest('li');
        var href = this.getAttribute('href');
        // If already open and not navigating away, just toggle
        if (li.classList.contains('open')) {
          e.preventDefault();
          li.classList.remove('open');
        } else {
          li.classList.add('open');
          // Allow navigation
        }
      });
    });
  </script>
</body>
</html>
