name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate sidebar from index.md
        run: node scripts/generate_sidebar.js

      - name: Commit generated sidebar if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/sidebar.yml
          git diff --cached --quiet || git commit -m "chore: regenerate sidebar from index.md"
          git push || true

      - name: Deploy Jekyll to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,scripts,*.py,*.js'
